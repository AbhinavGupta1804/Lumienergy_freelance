services:
  lumi-caller:
    build: .
    image: lumi-caller:latest
    container_name: lumi-caller
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials:ro
      # Uncomment if DATABASE_BACKEND=sqlite:
      # - ./data:/app/data
